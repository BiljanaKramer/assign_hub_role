    #    role: "galaxy.MAN_collection_approve"
    #    targets:
    #      collection_namespaces:
    #        - "middleware"
    #    #    - "MAN_staging_Middleware"
    #    state: present
    #    ah_host: "{{ aap_hostname }}"
    #    ah_username: "{{ aap_username }}"
    #    ah_password: "{{ aap_password }}"
    #    validate_certs: "{{ aap_validate_certs }}"
